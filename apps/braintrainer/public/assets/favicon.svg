<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">Brain Trainer favicon</title>
  <desc id="desc">The Brain Trainer brain network mark without wordmark text.</desc>
  <defs>
    <linearGradient id="brainStroke" x1="250" x2="790" y1="90" y2="470" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0B5B68"/>
      <stop offset="1" stop-color="#064C5A"/>
    </linearGradient>
    <linearGradient id="mint" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#9AD0AE"/>
      <stop offset="1" stop-color="#66A77D"/>
    </linearGradient>
    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="120%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#063B45" flood-opacity="0.18"/>
    </filter>
  </defs>
  <style>
    .brain-line,
    .network-line {
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .brain-line {
      stroke: url(#brainStroke);
      stroke-width: 22;
    }
    .network-line {
      stroke: #0B5B68;
      stroke-width: 12;
    }
    .node,
    .leaf {
      fill: url(#mint);
    }
    .spark {
      fill: #E7B93F;
    }
    @media (prefers-color-scheme: dark) {
      .brain-line,
      .network-line {
        stroke: #7ED3E2;
      }
      .node,
      .leaf {
        fill: #A9E2BF;
      }
      .spark {
        fill: #FFE36A;
      }
    }
    @media (forced-colors: active) {
      .brain-line,
      .network-line {
        stroke: CanvasText;
      }
      .node,
      .leaf,
      .spark {
        fill: CanvasText;
      }
    }
  </style>
  <g filter="url(#softShadow)" transform="translate(-119 79) scale(.708)">
    <path class="brain-line" d="M430 99c-54 0-96 33-109 80-41 4-75 34-87 74-11 37 0 75 28 99-21 19-28 50-17 79 16 43 62 66 108 54 20-5 37-17 49-34"/>
    <path class="brain-line" d="M494 137c-30-10-54-35-54-66 0-44 43-75 103-75 68 0 118 42 143 113"/>
    <path class="brain-line" d="M700 154c56-4 101 28 117 79 12 38 2 78-25 104 16 26 16 58 0 86-25 44-82 57-134 32"/>
    <path class="brain-line" d="M529 282c44-8 74-38 84-82"/>
    <path class="brain-line" d="M537 285c87 2 160 33 208 88"/>
    <path class="brain-line" d="M535 389c38 8 72 30 91 63"/>
    <path class="brain-line" d="M483 445c-11 25-30 42-56 49"/>
    <path class="network-line" d="M338 210c64 29 103 67 126 123"/>
    <path class="network-line" d="M328 378c42-32 84-52 136-62"/>
    <path class="network-line" d="M611 211c-11 47-34 80-76 100"/>
    <circle class="node" cx="334" cy="205" r="32"/>
    <circle class="node" cx="486" cy="320" r="31"/>
    <circle class="node" cx="319" cy="388" r="32"/>
    <circle class="node" cx="611" cy="210" r="32"/>
    <circle class="node" cx="704" cy="388" r="32"/>
    <ellipse class="leaf" cx="728" cy="137" rx="20" ry="43" transform="rotate(-35 728 137)"/>
    <ellipse class="leaf" cx="794" cy="165" rx="24" ry="51" transform="rotate(52 794 165)"/>
    <path class="spark" d="M759 53c8 36 13 42 48 50-35 8-40 14-48 50-8-36-13-42-48-50 35-8 40-14 48-50Z"/>
  </g>
</svg>
