<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-labelledby="title desc">
  <title id="title">BrainTrainer logo</title>
  <desc id="desc">Coffee-colored brain and training path icon.</desc>
  <style>
    .brain { fill: #7a4a24; }
    .fold, .dot { stroke: #f7d9bd; }
    .dot { fill: #f7d9bd; stroke: none; }
    .base { stroke: #7a4a24; }
    @media (prefers-color-scheme: dark) {
      .brain { fill: #f1c9a7; }
      .fold, .dot { stroke: #3a2417; }
      .dot { fill: #3a2417; }
      .base { stroke: #f1c9a7; }
    }
    @media (forced-colors: active) {
      .brain, .dot { fill: CanvasText; }
      .fold, .base { stroke: CanvasText; }
    }
  </style>
