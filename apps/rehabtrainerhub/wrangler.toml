name = "rehabtrainerhub"
compatibility_date = "2026-07-02"
pages_build_output_dir = "out"

[[d1_databases]]
binding = "REHAB_DB"
database_name = "rehab_db"
database_id = "0f4e6bb2-cf41-4051-ad74-19bb501fe9dd"
migrations_dir = "migrations"

# Wrangler 4 provisions these draft resources on the first deployment and
# keeps the resulting bindings attached to the Pages project.
[[kv_namespaces]]
binding = "ARTICLE_CACHE"

[[r2_buckets]]
binding = "ASSET_BUCKET"
