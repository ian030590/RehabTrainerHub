name: Deploy Cloudflare Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: "cloudflare-pages-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: cloudflare-pages
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci --workspaces=false

      - name: Build all apps
        run: npm run build:cloudflare
        env:
          NEXT_PUBLIC_SITE_URL: ${{ vars.REHABTRAINERHUB_URL || vars.NEXT_PUBLIC_SITE_URL }}
          NEXT_PUBLIC_AUTH_API_BASE: ${{ vars.AUTH_API_BASE || vars.REHABTRAINERHUB_URL || vars.NEXT_PUBLIC_SITE_URL }}
          NEXT_PUBLIC_REHABTRAINERHUB_URL: ${{ vars.REHABTRAINERHUB_URL || vars.NEXT_PUBLIC_SITE_URL }}
          NEXT_PUBLIC_STROKETRAINER_URL: ${{ vars.STROKETRAINER_URL }}
          NEXT_PUBLIC_VISIONTRAINER_URL: ${{ vars.VISIONTRAINER_URL }}
          NEXT_PUBLIC_BRAINTRAINER_URL: ${{ vars.BRAINTRAINER_URL }}
          VITE_AUTH_API_BASE: ${{ vars.AUTH_API_BASE || vars.REHABTRAINERHUB_URL || vars.NEXT_PUBLIC_SITE_URL }}
          VITE_REHABTRAINERHUB_URL: ${{ vars.REHABTRAINERHUB_URL || vars.NEXT_PUBLIC_SITE_URL }}
          VITE_STROKETRAINER_URL: ${{ vars.STROKETRAINER_URL }}
          VITE_VISIONTRAINER_URL: ${{ vars.VISIONTRAINER_URL }}
          VITE_BRAINTRAINER_URL: ${{ vars.BRAINTRAINER_URL }}
          VITE_VOSK_MODEL_ZH_URL: ${{ vars.VITE_VOSK_MODEL_ZH_URL }}
          VITE_VOSK_MODEL_EN_URL: ${{ vars.VITE_VOSK_MODEL_EN_URL }}
          VITE_VOSK_MODEL_ZH_VOCAB_URL: ${{ vars.VITE_VOSK_MODEL_ZH_VOCAB_URL }}
          VITE_VOSK_MODEL_EN_VOCAB_URL: ${{ vars.VITE_VOSK_MODEL_EN_VOCAB_URL }}
          VITE_VOSK_MODEL_MIN_BYTES: ${{ vars.VITE_VOSK_MODEL_MIN_BYTES }}

      - name: Ensure and deploy Cloudflare Pages projects
        timeout-minutes: 15
        run: node scripts/deploy-cloudflare-pages.mjs --branch=${{ github.ref_name }} --production-branch=main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          AUTH_API_BASE: ${{ vars.AUTH_API_BASE || vars.REHABTRAINERHUB_URL || vars.NEXT_PUBLIC_SITE_URL }}
          AUTH_BASE_URL: ${{ vars.AUTH_API_BASE || vars.REHABTRAINERHUB_URL || vars.NEXT_PUBLIC_SITE_URL }}
          AUTH_ALLOWED_ORIGINS: ${{ vars.AUTH_ALLOWED_ORIGINS }}
          REHABTRAINERHUB_URL: ${{ vars.REHABTRAINERHUB_URL || vars.NEXT_PUBLIC_SITE_URL }}
          STROKETRAINER_URL: ${{ vars.STROKETRAINER_URL }}
          VISIONTRAINER_URL: ${{ vars.VISIONTRAINER_URL }}
          BRAINTRAINER_URL: ${{ vars.BRAINTRAINER_URL }}
          AUTH_SESSION_SECRET: ${{ secrets.AUTH_SESSION_SECRET }}
          AUTH_STATE_SECRET: ${{ secrets.AUTH_STATE_SECRET }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
