name: Deploy Cloudflare Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: "cloudflare-pages-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: cloudflare-pages
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci --workspaces=false

      - name: Discover Pages app environment
        run: node scripts/write-pages-env.mjs >> "$GITHUB_ENV"

      - name: Build all apps
        run: npm run build:cloudflare
        env:
          VITE_VOSK_MODEL_ZH_URL: ${{ vars.VITE_VOSK_MODEL_ZH_URL }}
          VITE_VOSK_MODEL_EN_URL: ${{ vars.VITE_VOSK_MODEL_EN_URL }}
          VITE_VOSK_MODEL_ZH_VOCAB_URL: ${{ vars.VITE_VOSK_MODEL_ZH_VOCAB_URL }}
          VITE_VOSK_MODEL_EN_VOCAB_URL: ${{ vars.VITE_VOSK_MODEL_EN_VOCAB_URL }}
          VITE_VOSK_MODEL_MIN_BYTES: ${{ vars.VITE_VOSK_MODEL_MIN_BYTES }}

      - name: Ensure and deploy Cloudflare Pages projects
        timeout-minutes: 15
        run: node scripts/deploy-cloudflare-pages.mjs --branch=${{ github.ref_name }} --production-branch=main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          AUTH_ALLOWED_ORIGINS: ${{ vars.AUTH_ALLOWED_ORIGINS }}
          VITE_VOSK_MODEL_ZH_URL: ${{ vars.VITE_VOSK_MODEL_ZH_URL }}
          VITE_VOSK_MODEL_EN_URL: ${{ vars.VITE_VOSK_MODEL_EN_URL }}
          VITE_VOSK_MODEL_ZH_VOCAB_URL: ${{ vars.VITE_VOSK_MODEL_ZH_VOCAB_URL }}
          VITE_VOSK_MODEL_EN_VOCAB_URL: ${{ vars.VITE_VOSK_MODEL_EN_VOCAB_URL }}
          VITE_VOSK_MODEL_MIN_BYTES: ${{ vars.VITE_VOSK_MODEL_MIN_BYTES }}
          AUTH_SESSION_SECRET: ${{ secrets.AUTH_SESSION_SECRET }}
          AUTH_STATE_SECRET: ${{ secrets.AUTH_STATE_SECRET }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}

      - name: Smoke test changed Trainers
        run: node scripts/check-changed-trainer-smoke.mjs
        env:
          SMOKE_BASE_SHA: ${{ github.event.before }}
          SMOKE_HEAD_SHA: ${{ github.sha }}
